version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: env-nginx-1
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - web2
      - media

  media:
    image: nginx:alpine
    container_name: media_server
    volumes:
      - shared-image-data:/usr/share/nginx/html/images:ro

  web:
    image: env-web:latest
    container_name: nodejs
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./vol/nodejs:/home/node/projects
      - shared-image-data:/images:ro

  web2:
    image: env-web:latest
    container_name: nodejs2
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "4000:4000"
    volumes:
      - ./vol/nodejs2:/home/node/projects
      - shared-image-data:/app_images

  db:
    image: env-db:latest
    container_name: mysql
    tty: true
    environment:
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - "3306:3306"
    volumes:
      - ./vol/mysql:/var/lib/mysql

volumes:
  shared-image-data:
    name: meshi_shared_images