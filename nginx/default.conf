server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # 1. 共通の画像サーバー（共有ボリューム）へのアクセス
    location /images/ {
        proxy_pass http://media; 
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. 管理側 (web2:4000) への振り分け
    location ~* ^/(Cologin|dashboard|stores|register|Clogout|companies|password-change|delete-account|stylesheets|javascripts|company) {
        proxy_pass http://web2:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. ユーザー側 (web1:3000) への振り分け
    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ユーザー側の静的ファイル
    location /pictures/ { proxy_pass http://web:3000/pictures/; }
    location /style/    { proxy_pass http://web:3000/style/; }
}