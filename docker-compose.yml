version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: env-nginx-1
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - web2
      - media

  media:
    image: nginx:alpine
    container_name: media_server
    volumes:
      - shared-image-data:/usr/share/nginx/html/images:ro

  web:
    build: .
    container_name: nodejs
    tty: true
    working_dir: /home/node/projects/webtest
    command: node src/server.js
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./vol/nodejs:/home/node/projects
      # ブラウザが画像を表示できるよう、マウント先を固定
      - shared-image-data:/home/node/projects/webtest/public/images:rw

  web2:
    build: .
    container_name: nodejs2
    tty: true
    working_dir: /home/node/projects
    command: node src/index.js
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "4000:4000"
    volumes:
      - ./vol/nodejs2:/home/node/projects
      # Multerの保存先（アプリ側の設定）に合わせる
      - shared-image-data:/app_images

  db:
    image: mysql:8.0
    container_name: mysql
    tty: true
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=MealReputation
    ports:
      - "3306:3306"
    volumes:
      - ./vol/mysql:/var/lib/mysql

volumes:
  shared-image-data:
    name: meshi_shared_images